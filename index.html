      function makeArtwork(label, start, end) {
        const svg = `
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
            <defs>
              <radialGradient id="g" cx="50%" cy="35%" r="70%">
                <stop offset="0%" stop-color="${start}"/>
                <stop offset="48%" stop-color="#15151d"/>
                <stop offset="100%" stop-color="${end}"/>
              </radialGradient>
              <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            </defs>
            <rect width="300" height="300" fill="#09090d"/>
            <circle cx="150" cy="150" r="118" fill="url(#g)" opacity=".68"/>
            <circle cx="150" cy="150" r="84" fill="none" stroke="${start}" stroke-width="6" opacity=".8"/>
            <circle cx="150" cy="150" r="35" fill="#09090d" stroke="${end}" stroke-width="5"/>
            <text x="150" y="164" text-anchor="middle" font-family="Inter, Arial" font-size="34" font-weight="900" fill="#f8fbff" filter="url(#glow)">${label}</text>
          </svg>`;
        return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
      }

      function normalizeTitle(title) {
        return title.toLowerCase().replace(/[()]/g, "").trim();
      }

      function profileForTitle(title, fallbackBpm) {
        const normalized = normalizeTitle(title);
        const matchKey = Object.keys(knownSongProfiles).find((key) => normalized.includes(key));
        if (matchKey) {
          return knownSongProfiles[matchKey];
        }

        const bpm = fallbackBpm || estimateBpm(title);
        if (bpm >= 146) {
          return {
            bpm,
            category: "Sprint",
            rpm: "100-115",
            note: "Fast interval track. Keep gear light-to-moderate and coach quick resets between pushes.",
          };
        }
        if (bpm >= 128) {
          return {
            bpm,
            category: "Choreography",
            rpm: "72-90",
            note: "Rhythm-forward track. Use jumps, tap backs, or arms if the beat feels clean.",
          };
        }
        if (bpm >= 112) {
          return {
            bpm,
            category: "Moderate",
            rpm: "68-86",
            note: "Steady room-builder. Use out-of-saddle moderate work, active recovery, or a controlled combo.",
          };
        }
        if (bpm >= 90) {
          return {
            bpm,
            category: "Hill",
            rpm: "54-72",
            note: "Heavier feel. Add gear slowly and coach posture, breath, and quiet upper body.",
          };
        }
        return {
          bpm,
          category: "Mindfulness",
          rpm: "45-62",
          note: "Lower intensity. Use it for a reflective final ride, cooldown, or stretch transition.",
        };
      }

      function estimateBpm(title) {
        const clean = title || "ride";
        const hash = clean.split("").reduce((sum, char) => sum + char.charCodeAt(0), 0);
        return 82 + (hash % 72);
      }

      function formatDuration(milliseconds) {
        if (!milliseconds) return "3:30";
        const totalSeconds = Math.round(milliseconds / 1000);
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = `${totalSeconds % 60}`.padStart(2, "0");
        return `${minutes}:${seconds}`;
      }

      function songId(song) {
        return `${song.title}-${song.artist}-${song.category}`.toLowerCase().replace(/[^a-z0-9]+/g, "-");
      }

      function useHashPage() {
        const readHash = () => {
          const hash = window.location.hash.replace("#", "");
          return pageOrder.includes(hash) ? hash : "home";
        };
        const [page, setPageState] = useState(readHash);

        useEffect(() => {
          const onHashChange = () => setPageState(readHash());
          window.addEventListener("hashchange", onHashChange);
          return () => window.removeEventListener("hashchange", onHashChange);
        }, []);

        const setPage = (nextPage) => {
          window.location.hash = nextPage;
          setPageState(nextPage);
          window.scrollTo({ top: 0, behavior: "smooth" });
        };

        return [page, setPage];
      }

      function App() {
        const [page, setPage] = useHashPage();
        const activeIndex = pageOrder.indexOf(page);
        const [homeGear, setHomeGear] = useState(0);

        useEffect(() => {
          if (page !== "home") {
            return;

          setHomeGear(0);
        }, [page]);

        return (

            <Atmosphere />
            <GearDialNav
              pages={mainPages}
              activePage={page}
              activeIndex={activeIndex}
              homeGear={homeGear}
              onNavigate={setPage}

              {page === "home" && (
                <HomePage
                  onStart={() => setPage("set")}
                  gear={homeGear}
                  onIncreaseGear={() => setHomeGear(1)}

              {page === "set" && <SetRidePage />}
              {page === "beat" && <BuildBeatPage />}
              {page === "movement" && <MovementPage />}
              {page === "finish" && <FinishPage />}

        );

      function Atmosphere() {

      function GearDialNav({ pages, activePage, activeIndex, homeGear, onNavigate }) {
        const safeIndex = Math.max(0, activeIndex);
        const rotation = safeIndex * 42;
        const isHome = activePage === "home";
        const showHomeNav = !isHome || homeGear >= 1;

        const goForward = () => {
          const next = pages[(safeIndex + 1) % pages.length].id;
          onNavigate(next);
        };

        const goBack = () => {
          const previous = pages[(safeIndex - 1 + pages.length) % pages.length].id;
          onNavigate(previous);
        };

        return (
          <nav className={`gear-nav ${showHomeNav ? "is-visible" : "is-hidden"} ${isHome ? "is-home" : ""}`} aria-label="Resistance dial navigation">
            <button className="brand-mark" onClick={() => onNavigate("home")} aria-label="Go home">
              <span>Built on BPM</span>
              <BrandLogo />
            </button>
            <div className="gear-dial-wrap">
              <button className="dial-step dial-step-left" onClick={goBack} aria-label="Turn dial backward">
                -
              </button>
              <button className="gear-dial" onClick={goForward} aria-label="Turn dial forward">
                <span className="dial-indicator" style={{ transform: `rotate(${rotation}deg)` }}></span>
                <span className="dial-core">
                  <small>Gear</small>
                  <strong>{pages[safeIndex]?.eyebrow}</strong>
                </span>
              </button>
              <button className="dial-step dial-step-right" onClick={goForward} aria-label="Turn dial forward">
                +
              </button>
            </div>

                ))}
              </div>
            )}

        );

      function HomeGearIntro({ gear, onIncreaseGear }) {
        const dialRef = useRef(null);
        const dragStateRef = useRef({ dragging: false, pointerId: null });
        const [turnProgress, setTurnProgress] = useState(0);

        useEffect(() => {
          setTurnProgress(gear >= 1 ? 1 : 0);
        }, [gear]);

        const updateTurnProgress = (event) => {
          if (!dialRef.current) return;

          const rect = dialRef.current.getBoundingClientRect();
          const nextProgress = Math.max(0, Math.min(1, (event.clientX - rect.left) / rect.width));

          setTurnProgress(nextProgress);

          if (nextProgress >= 0.78 && gear < 1) {
            onIncreaseGear();
            setTurnProgress(1);
            dragStateRef.current.dragging = false;
            if (dragStateRef.current.pointerId !== null) {
              dialRef.current.releasePointerCapture(dragStateRef.current.pointerId);
            }
            dragStateRef.current.pointerId = null;
          }
        };

        const handlePointerDown = (event) => {
          if (gear >= 1) return;
          dragStateRef.current.dragging = true;
          dragStateRef.current.pointerId = event.pointerId;
          event.currentTarget.setPointerCapture(event.pointerId);
          updateTurnProgress(event);
        };

        const handlePointerMove = (event) => {
          if (!dragStateRef.current.dragging || gear >= 1) return;
          updateTurnProgress(event);
        };

        const handlePointerEnd = (event) => {
          if (!dragStateRef.current.dragging) return;
          dragStateRef.current.dragging = false;
          if (dragStateRef.current.pointerId !== null) {
            event.currentTarget.releasePointerCapture(dragStateRef.current.pointerId);
          }
          dragStateRef.current.pointerId = null;
          if (gear < 1) {
            setTurnProgress(0);
          }
        };

        const dialProgress = gear >= 1 ? 1 : turnProgress;
        const handleAngle = -42 + dialProgress * 84;
        const progressOffset = 196 * (1 - dialProgress);

        const handleKeyDown = (event) => {
          if (gear >= 1) return;

          const keyProgress = {
            ArrowRight: Math.min(1, turnProgress + 0.12),
            ArrowUp: Math.min(1, turnProgress + 0.12),
            ArrowLeft: Math.max(0, turnProgress - 0.12),
            ArrowDown: Math.max(0, turnProgress - 0.12),
            Home: 0,
            End: 1,
          }[event.key];

          if (keyProgress === undefined) return;
          event.preventDefault();
          setTurnProgress(keyProgress);

          if (keyProgress >= 0.78) {
            onIncreaseGear();
            setTurnProgress(1);
          }
        };

        return (
          <div className="home-gear-intro">
            <div
              ref={dialRef}
              className={`home-gear-control ${gear >= 1 ? "is-complete" : ""}`}
              onPointerDown={handlePointerDown}
              onPointerMove={handlePointerMove}
              onPointerUp={handlePointerEnd}
              onPointerCancel={handlePointerEnd}
              onKeyDown={handleKeyDown}
              role="slider"
              tabIndex={gear >= 1 ? -1 : 0}
              aria-label="Gear up from zero to one"
              aria-valuemin="0"
              aria-valuemax="1"
              aria-valuenow={Number(dialProgress.toFixed(2))}
              aria-valuetext={gear < 1 ? "Gear up, drag right to increase from zero to one" : "Gear one engaged"}

            return [{ ...song, savedAt: Date.now() }, ...current];

      function SongSearchPanel({ onAdd, playlist }) {
        const [query, setQuery] = useState("Summertime Sadness");
        const [result, setResult] = useState({ ...seedSongs[0], id: songId(seedSongs[0]) });
        const [loading, setLoading] = useState(false);
        const [error, setError] = useState("");

        const isSaved = result && playlist.some((song) => song.id === (result.id || songId(result)));

        const searchSong = async (event) => {
          event.preventDefault();
          const trimmed = query.trim();
          if (!trimmed) return;

          setLoading(true);
          setError("");
          try {
            const response = await fetch(
              `https://itunes.apple.com/search?term=${encodeURIComponent(trimmed)}&entity=song&limit=5`
            );
            if (!response.ok) throw new Error("Song API unavailable");
            const data = await response.json();
            if (!data.results?.length) throw new Error("No matching songs found");
            const track = data.results[0];
            const profile = profileForTitle(track.trackName);
            setResult({
              id: `${track.trackId}-${profile.category}`,
              title: track.trackName,
              artist: track.artistName,
              bpm: profile.bpm,
              category: profile.category,
              rpm: profile.rpm,
              note: profile.note,
              duration: formatDuration(track.trackTimeMillis),
              artwork: (track.artworkUrl100 || makeArtwork("BEAT", "#00d4ff", "#ff3bd4")).replace("100x100", "600x600"),
              source: "iTunes Search API + instructor BPM logic",
            });
          } catch (apiError) {
            const fallback =
              seedSongs.find((song) => normalizeTitle(song.title).includes(normalizeTitle(trimmed))) ||
              seedSongs[Math.abs(trimmed.length) % seedSongs.length];
            setResult({ ...fallback, id: songId(fallback) });
            setError("Live search could not finish, so the studio loaded a curated fallback track.");
          } finally {
            setLoading(false);
          }
        };

        return (
          <section className="song-search-panel">
            <p className="eyebrow">Song analyzer</p>
            <form className="song-search-form" onSubmit={searchSong}>
              <label htmlFor="song-query">Search a song</label>
              <div>
                <input
                  id="song-query"
                  value={query}
                  onChange={(event) => setQuery(event.target.value)}

                <button type="submit">{loading ? "Listening..." : "Analyze"}</button>
              </div>
            </form>
            {error && <p className="soft-alert">{error}</p>}
            {result && <SongResultCard song={result} onAdd={onAdd} isSaved={isSaved} />}
            <div className="seed-row">
              {seedSongs.map((song) => (
                <button
                  key={song.title}
                  onClick={() => {
                    setQuery(song.title);
                    setResult({ ...song, id: songId(song) });
                    setError("");
                  }}
                >
                  {song.title}
                </button>
              ))}
            </div>
          </section>
        );
      }

        return (
          <section className="content-page finish-page">
            <SectionHeader eyebrow="Step 4" title="The Final Lap">
              This is the last song of class. Riders have already done the hard work, so give them
              a moment to feel how far they have come, thank them for showing up, remind them to
              love the only body they get, then turn the lights off and tell them the next minute
              is theirs to choose what to do with it; all you ask is that they do not stop moving,
              then bring everyone back for the final 30 seconds and a quick stretch.
            </SectionHeader>

            <div className="finish-layout">
              <ClosingMoodSelector mood={mood} onMoodChange={setMood} />
              <article className="closing-script">
                <h3>{closingMoods[mood].line}</h3>
                <p>{closingMoods[mood].ritual}</p>
                <div className="recommended-song">
                  <span>Recommended song</span>
                  <strong>{closingMoods[mood].song}</strong>
                </div>
              </article>
            </div>

            <div className="affirmation-grid">
              {affirmations.map((affirmation, index) => (
                <button
                  key={affirmation}
                  className={revealed.includes(index) ? "revealed" : ""}
                  onClick={() => toggleAffirmation(index)}
                >
                  <span>{revealed.includes(index) ? affirmation : "Tap to reveal"}</span>
                </button>
              ))}
            </div>

            <section className="ritual-builder">
              <div className="ritual-live-card">
                <p className="eyebrow">Cooldown conductor</p>
                <h3>{ritualSteps[activeRitual].title}</h3>
                <p>{ritualSteps[activeRitual].cue}</p>
                <span>{ritualSteps[activeRitual].count}</span>
                <div className="ritual-controls">
                  <button onClick={() => setActiveRitual((current) => Math.max(0, current - 1))}>Previous</button>
                  <button onClick={() => toggleStep(activeRitual)}>
                    {completedSteps.includes(activeRitual) ? "Undo step" : "Mark done"}
                  </button>
                  <button onClick={() => setActiveRitual((current) => Math.min(ritualSteps.length - 1, current + 1))}>Next</button>
                </div>
              </div>
              <div className="ritual-timeline">
                <div className="ritual-progress" aria-label={`Ritual progress ${progress}%`}>
                  <span style={{ width: `${progress}%` }}></span>
                </div>
                {ritualSteps.map((step, index) => (
                  <button
                    key={step.title}
                    className={`${activeRitual === index ? "active" : ""} ${completedSteps.includes(index) ? "complete" : ""}`}
                    onClick={() => toggleStep(index)}
                  >
                    <small>{String(index + 1).padStart(2, "0")}</small>
                    <strong>{step.title}</strong>
                    <span>{completedSteps.includes(index) ? "Complete" : step.count}</span>
                  </button>
                ))}
              </div>
            </section>
          </section>
        );
      }

      function ClosingMoodSelector({ mood, onMoodChange }) {
        return (
          <div className="mood-selector">
            <p className="eyebrow">Choose the room tone</p>
            {Object.entries(closingMoods).map(([key, value]) => (
              <button key={key} className={mood === key ? "active" : ""} onClick={() => onMoodChange(key)}>
                <strong>{value.title}</strong>
                <span>{value.ritual}</span>
              </button>
            ))}
          </div>
        );
      }

      function WireframeRoute() {
        return (
          <section className="content-page wireframe-route">
            <SectionHeader eyebrow="Proposal artifact" title="Wireframe Plan">
              Screenshot this route or open wireframe.html for the grayscale planning document.
            </SectionHeader>
            <WireframeDocument />
          </section>
        );
      }

      function WireframeDocument() {
        const frames = [
          ["Homepage", "Full-screen hero, animated bike wheel, LED wall words, dial navigation, CTA."],
          ["Set the Ride", "Clickable bike diagram, form toggle, metric cards, terminology strip."],
          ["Build the Beat", "iTunes song search, BPM/class logic, song card, localStorage playlist panel."],
          ["Lead the Movement", "Movement filters, expandable cards, build-a-sequence interaction."],
          ["The Final Lap", "Mood selector, affirmation reveal cards, cooldown ritual timeline."],
        ];
        return (
          <div className="wireframe-doc">
            {frames.map(([title, note]) => (
              <article className="wf-frame" key={title}>
                <header>
                  <span>{title}</span>
                  <small>{note}</small>
                </header>
                <div className="wf-hero-box">Hero / section title</div>
                <div className="wf-row">
                  <div className="wf-box tall">Primary interactive module</div>
                  <div className="wf-stack">
                    <div className="wf-box">State-driven panel</div>
                    <div className="wf-box">Notes / cues</div>
                    <div className="wf-box">CTA / controls</div>
                  </div>
                </div>
              </article>
            ))}
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
