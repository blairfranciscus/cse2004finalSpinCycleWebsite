      function makeArtwork(label, start, end) {
        const svg = `

              <radialGradient id="g" cx="50%" cy="35%" r="70%">

            </defs>
            <rect width="300" height="300" fill="#09090d"/>
            <circle cx="150" cy="150" r="118" fill="url(#g)" opacity=".68"/>
            <circle cx="150" cy="150" r="84" fill="none" stroke="${start}" stroke-width="6" opacity=".8"/>
            <circle cx="150" cy="150" r="35" fill="#09090d" stroke="${end}" stroke-width="5"/>
            <text x="150" y="164" text-anchor="middle" font-family="Inter, Arial" font-size="34" font-weight="900" fill="#f8fbff" filter="url(#glow)">${label}</text>
          </svg>`;
        return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;

      function normalizeTitle(title) {
        return title.toLowerCase().replace(/[()]/g, "").trim();
      }

      function profileForTitle(title, fallbackBpm) {
        const normalized = normalizeTitle(title);
        const matchKey = Object.keys(knownSongProfiles).find((key) => normalized.includes(key));
        if (matchKey) {
          return knownSongProfiles[matchKey];
        }

        const bpm = fallbackBpm || estimateBpm(title);
        if (bpm >= 146) {
          return {
            bpm,
            category: "Sprint",
            rpm: "100-115",
            note: "Fast interval track. Keep gear light-to-moderate and coach quick resets between pushes.",
          };
        }
        if (bpm >= 128) {
          return {
            bpm,
            category: "Choreography",
            rpm: "72-90",
            note: "Rhythm-forward track. Use jumps, tap backs, or arms if the beat feels clean.",
          };
        }
        if (bpm >= 112) {
          return {
            bpm,
            category: "Moderate",
            rpm: "68-86",
            note: "Steady room-builder. Use out-of-saddle moderate work, active recovery, or a controlled combo.",
          };
        }
        if (bpm >= 90) {
          return {
            bpm,
            category: "Hill",
            rpm: "54-72",
            note: "Heavier feel. Add gear slowly and coach posture, breath, and quiet upper body.",
          };
        }
        return {
          bpm,
          category: "Mindfulness",
          rpm: "45-62",
          note: "Lower intensity. Use it for a reflective final ride, cooldown, or stretch transition.",
        };
      }

      function estimateBpm(title) {
        const clean = title || "ride";
        const hash = clean.split("").reduce((sum, char) => sum + char.charCodeAt(0), 0);
        return 82 + (hash % 72);
      }

      function formatDuration(milliseconds) {
        if (!milliseconds) return "3:30";
        const totalSeconds = Math.round(milliseconds / 1000);
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = `${totalSeconds % 60}`.padStart(2, "0");
        return `${minutes}:${seconds}`;
      }

      function songId(song) {
        return `${song.title}-${song.artist}-${song.category}`.toLowerCase().replace(/[^a-z0-9]+/g, "-");
      }

      function useHashPage() {
        const readHash = () => {
          const hash = window.location.hash.replace("#", "");
          return pageOrder.includes(hash) ? hash : "home";
        };
        const [page, setPageState] = useState(readHash);

        useEffect(() => {
          const onHashChange = () => setPageState(readHash());
          window.addEventListener("hashchange", onHashChange);
          return () => window.removeEventListener("hashchange", onHashChange);
        }, []);

        const setPage = (nextPage) => {
          window.location.hash = nextPage;
          setPageState(nextPage);
          window.scrollTo({ top: 0, behavior: "smooth" });
        };

        return [page, setPage];
      }

      function App() {
        const [page, setPage] = useHashPage();
        const activeIndex = pageOrder.indexOf(page);

            return;

          setHomeGear(0);
        }, [page]);

              activePage={page}
              activeIndex={activeIndex}
              homeGear={homeGear}
              onNavigate={setPage}

              {page === "home" && (

                  gear={homeGear}
                  onIncreaseGear={() => setHomeGear(1)}

      function GearDialNav({ pages, activePage, activeIndex, homeGear, onNavigate }) {
        const safeIndex = Math.max(0, activeIndex);
        const rotation = safeIndex * 42;
        const isHome = activePage === "home";
        const showHomeNav = !isHome || homeGear >= 1;

        const goForward = () => {
          const next = pages[(safeIndex + 1) % pages.length].id;
          onNavigate(next);
        };

        const goBack = () => {
          const previous = pages[(safeIndex - 1 + pages.length) % pages.length].id;
          onNavigate(previous);
        };

        return (
          <nav className={`gear-nav ${showHomeNav ? "is-visible" : "is-hidden"} ${isHome ? "is-home" : ""}`} aria-label="Resistance dial navigation">
            <button className="brand-mark" onClick={() => onNavigate("home")} aria-label="Go home">

                <span className="dial-core">

      function HomeGearIntro({ gear, onIncreaseGear }) {
        const knobRef = useRef(null);
        const dragStateRef = useRef({ dragging: false, pointerId: null });
        const [turnProgress, setTurnProgress] = useState(0);

        useEffect(() => {
          setTurnProgress(gear >= 1 ? 36 : 0);
        }, [gear]);

        const updateTurnProgress = (event) => {
          if (!knobRef.current) return;

          const rect = knobRef.current.getBoundingClientRect();
          const centerX = rect.left + rect.width / 2;
          const centerY = rect.top + rect.height / 2;
          let angle = (Math.atan2(event.clientY - centerY, event.clientX - centerX) * 180) / Math.PI;
          angle = (angle + 450) % 360;

          let nextProgress = angle;
          if (nextProgress > 180) nextProgress = 0;
          nextProgress = Math.max(0, Math.min(88, nextProgress));
          setTurnProgress(nextProgress);

          if (nextProgress >= 32 && gear < 1) {
            onIncreaseGear();
            setTurnProgress(36);
            dragStateRef.current.dragging = false;
            if (dragStateRef.current.pointerId !== null) {
              knobRef.current.releasePointerCapture(dragStateRef.current.pointerId);
            }
            dragStateRef.current.pointerId = null;
          }
        };

        const handlePointerDown = (event) => {
          if (gear >= 1) return;
          dragStateRef.current.dragging = true;
          dragStateRef.current.pointerId = event.pointerId;
          event.currentTarget.setPointerCapture(event.pointerId);
          updateTurnProgress(event);
        };

        const handlePointerMove = (event) => {
          if (!dragStateRef.current.dragging || gear >= 1) return;
          updateTurnProgress(event);
        };

        const handlePointerEnd = (event) => {
          if (!dragStateRef.current.dragging) return;
          dragStateRef.current.dragging = false;
          if (dragStateRef.current.pointerId !== null) {
            event.currentTarget.releasePointerCapture(dragStateRef.current.pointerId);
          }
          dragStateRef.current.pointerId = null;
          if (gear < 1) {
            setTurnProgress(0);
          }
        };

        return (
          <div className="home-gear-intro">
            <div className="home-gear-copy">
              <span>{`Gear: ${gear}`}</span>
              <p>{gear < 1 ? "Turn the gear to the right to start your ride." : "Gear 1 engaged. The room is open."}</p>
            </div>
            <button
              ref={knobRef}
              className="home-gear-control"
              onPointerDown={handlePointerDown}
              onPointerMove={handlePointerMove}
              onPointerUp={handlePointerEnd}
              onPointerCancel={handlePointerEnd}
              disabled={gear >= 1}
              aria-label="Turn gear to the right from zero to one"
            >
              {gear < 1 && <span className="home-gear-arc" aria-hidden="true"></span>}
              {gear < 1 && (
                <span
                  className="home-gear-motion"
                  style={{ transform: `translateX(-50%) rotate(${Math.min(turnProgress, 52)}deg)` }}
                  aria-hidden="true"
                >
                  <svg viewBox="0 0 120 60" role="presentation">

                <strong>{gear < 1 ? "0 -> 1" : "1"}</strong>

            </button>
          </div>

      function NeonWordWall() {

      function BrandLogo({ large = false }) {

          <div className={`brand-logo ${large ? "is-large" : "is-compact"}`} aria-hidden="true">

                  x2="60"

              <circle className="brand-logo-core" cx="60" cy="60" r="11" />
              <path className="brand-logo-arc" d="M89 33 A36 36 0 0 1 98 60" />
              <circle className="brand-logo-tick" cx="91" cy="30" r="4.5" />

      function BikeSilhouette() {
        return (
          <svg className="bike-silhouette" viewBox="0 0 820 430" role="img" aria-label="Indoor cycling bike illustration">

              <path className="stabilizer rear" d="M474 336 L704 336 L721 352 L491 352 Z" />
              <circle className="transport-wheel" cx="164" cy="352" r="8" />
              <circle className="transport-wheel" cx="300" cy="352" r="8" />
              <circle className="transport-wheel" cx="517" cy="354" r="8" />
              <circle className="transport-wheel" cx="685" cy="354" r="8" />

            <g className="bike-frame">
              <path className="front-fork" d="M284 246 L249 334 L225 334 L259 246 Z" />
              <path className="main-beam" d="M285 246 L413 214 L500 250 L396 282 L301 279 Z" />
              <path className="seat-tube" d="M412 214 L455 154 L476 160 L449 243 L420 246 Z" />
              <path className="rear-stay" d="M450 243 L568 278 L548 299 L427 273 Z" />
              <path className="rear-leg" d="M548 299 L580 336 L551 336 L523 301 Z" />

            <g className="bike-cockpit">
              <path className="handlebar-post" d="M312 177 L281 124 L295 116 L329 167 Z" />

              <rect className="bike-console" x="216" y="103" width="38" height="24" rx="4" transform="rotate(-6 216 103)" />
              <path className="handlebars" d="M238 119 Q208 107 177 111 Q159 114 146 126 Q159 133 179 132 L222 132 Q241 131 249 124" />
              <path className="seat-post" d="M455 154 L469 109 L482 112 L468 159 Z" />
              <path className="saddle" d="M447 103 Q476 95 512 101 Q502 115 476 120 Q454 123 442 115 Z" />

            <g className="drive-system">

              <circle className="flywheel inner" cx="248" cy="282" r="61" />
              <circle className="flywheel core" cx="248" cy="282" r="14" />
              <path className="front-shroud" d="M206 205 Q174 232 165 281 Q170 335 223 350 L292 350 Q327 336 333 290 Q329 239 289 208 Z" />
              <path className="chain-guard" d="M301 231 Q349 215 389 238 Q416 255 424 289 Q411 315 382 324 L306 324 Q286 303 290 268 Q291 244 301 231 Z" />
              <circle className="crank outer" cx="356" cy="278" r="26" />
              <circle className="crank inner" cx="356" cy="278" r="8" />
              <line className="crank-arm" x1="356" y1="278" x2="392" y2="249" />
              <line className="crank-arm" x1="356" y1="278" x2="320" y2="307" />
              <line className="pedal-arm" x1="392" y1="249" x2="411" y2="249" />
              <line className="pedal-arm" x1="320" y1="307" x2="300" y2="307" />
              <rect className="pedal-platform" x="410" y="244" width="32" height="10" rx="4" />
              <rect className="pedal-platform" x="270" y="302" width="32" height="10" rx="4" />
            </g>

            <g className="bike-accents">
              <path className="accent-bottle" d="M430 191 L448 195 L441 224 L424 220 Z" />
              <path className="accent-stripe" d="M531 304 L546 309 L531 335 L516 330 Z" />
              <circle className="accent-knob" cx="431" cy="226" r="6" />
            </g>
          </svg>
        );
      }

      function SectionHeader({ eyebrow, title, children }) {
        return (
          <header className="section-header">
            <p className="eyebrow">{eyebrow}</p>
            <h2>{title}</h2>
            {children && <p>{children}</p>}
          </header>
        );
      }

      function SetRidePage() {
        const [activePart, setActivePart] = useState(bikeParts[0]);
        const [position, setPosition] = useState("seated");
        const [activeLanguage, setActiveLanguage] = useState(language[0]);

        return (
          <section className="content-page set-page">
            <SectionHeader eyebrow="Step 1" title="Set the Ride">
              Before the music does anything, the bike has to feel like an instrument: stable,
              responsive, and tuned to the rider in front of you.
            </SectionHeader>

            <div className="bike-lab">
              <BikeDiagram activePart={activePart} onSelect={setActivePart} />
              <article className="part-panel">
                <p className="eyebrow">Bike setup</p>
                <h3>{activePart.label}</h3>
                <p>{activePart.tip}</p>
                <div className="setup-steps">
                  <span>Measure</span>
                  <span>Clip in</span>
                  <span>Test the beat</span>
                </div>
              </article>
            </div>

            <div className="split-band">
              <div className="form-panel">
                <p className="eyebrow">Find your form</p>
                <h3>{position === "seated" ? "In the saddle" : "Out of the saddle"}</h3>
                <p>
                  {position === "seated"
                    ? "Stack ribs over hips, soften the grip, and coach a smooth pedal circle before asking for speed."
                    : "Hips hover over the saddle, shoulders stay low, and the gear catches the rider before choreography starts."}
                </p>
                <div className="position-toggle" role="group" aria-label="Riding position">
                  <button className={position === "seated" ? "active" : ""} onClick={() => setPosition("seated")}>
                    Seated
                  </button>
                  <button className={position === "standing" ? "active" : ""} onClick={() => setPosition("standing")}>
                    Standing
                  </button>
                </div>
              </div>
              <div className={`posture-demo ${position}`}>
                <img
                  className="posture-photo"
                  src="./spin picture.png"
                  alt="Reference photo showing standing and seated cycling positions"
                />
              </div>
            </div>

            <div className="metric-grid">
              {metrics.map((metric) => (
                <MetricCard key={metric.label} {...metric} />
              ))}
            </div>

            <section className="language-strip">
              <p className="eyebrow">Know the language</p>
              <div className="language-interactive">
                <div className="language-rail" role="tablist" aria-label="Cycling cue glossary">
                  {language.map((item) => (
                    <button
                      key={item.term}
                      className={activeLanguage.term === item.term ? "active" : ""}
                      onClick={() => setActiveLanguage(item)}
                      role="tab"
                      aria-selected={activeLanguage.term === item.term}
                    >
                      {item.term}
                    </button>
                  ))}
                </div>
                <p className="language-detail">{activeLanguage.detail}</p>
              </div>
            </section>
          </section>
        );
      }

      function BikeDiagram({ activePart, onSelect }) {
        return (
          <div className="bike-diagram">
            <svg viewBox="0 0 760 430" aria-label="Clickable bike setup diagram">
              <g className="diagram-bike">
                <circle cx="255" cy="290" r="88" />
                <circle cx="545" cy="290" r="88" />
                <path d="M255 290 L360 170 L450 290 L545 290 L462 170 L360 170 L255 290" />
                <path d="M360 170 L345 128 L430 128" />
                <path d="M462 170 L520 106 L612 112" />
                <path d="M520 106 L592 84" />
                <circle cx="405" cy="246" r="19" />
                <path d="M405 246 L450 220" />
              </g>
              {bikeParts.map((part) => (
                <g key={part.id}>
                  <circle
                    className={`hotspot ${activePart.id === part.id ? "active" : ""}`}
                    cx={`${part.x}%`}
                    cy={`${part.y}%`}
                    r="18"
                    onClick={() => onSelect(part)}
                  />
                  <text x={`${part.x}%`} y={`${part.y - 7}%`}>{part.label}</text>
                </g>
              ))}
            </svg>
          </div>
        );
      }

      function MetricCard({ label, value, detail }) {
        return (
          <article className="metric-card">
            <span>{label}</span>
            <strong>{value}</strong>
            <p>{detail}</p>
          </article>
        );
      }

      function BuildBeatPage() {
        const [playlist, setPlaylist] = useState(() => {
          try {
            const savedPlaylist = localStorage.getItem(PLAYLIST_STORAGE_KEY);
            return JSON.parse(savedPlaylist) || [];
          } catch (error) {
            return [];
          }
        });

        useEffect(() => {
          localStorage.setItem(PLAYLIST_STORAGE_KEY, JSON.stringify(playlist));
        }, [playlist]);

        const addSong = (song) => {
          setPlaylist((current) => {
            if (current.some((item) => item.id === song.id)) return current;
            return [{ ...song, savedAt: Date.now() }, ...current];
          });
        };

        const removeSong = (songId) => {
          setPlaylist((current) => current.filter((song) => song.id !== songId));
        };

        return (
          <section className="content-page beat-page">
            <SectionHeader eyebrow="Step 2" title="Build the Beat">
              Choose songs for what they do in the room: introduce the bike, drive a sprint,
              carry a hill, open choreography, or create a quiet final reset.
            </SectionHeader>
            <div className="beat-layout">
              <SongSearchPanel onAdd={addSong} playlist={playlist} />
              <PlaylistPanel
                playlist={playlist}
                onRemove={removeSong}
                onClear={() => setPlaylist([])}
              />
            </div>
          </section>
        );
      }

      function SongSearchPanel({ onAdd, playlist }) {
        const [query, setQuery] = useState("Summertime Sadness");
        const [result, setResult] = useState({ ...seedSongs[0], id: songId(seedSongs[0]) });
        const [loading, setLoading] = useState(false);
        const [error, setError] = useState("");

        const isSaved = result && playlist.some((song) => song.id === (result.id || songId(result)));

        const searchSong = async (event) => {
          event.preventDefault();
          const trimmed = query.trim();
          if (!trimmed) return;

          setLoading(true);
          setError("");
          try {
            const response = await fetch(
              `https://itunes.apple.com/search?term=${encodeURIComponent(trimmed)}&entity=song&limit=5`
            );
            if (!response.ok) throw new Error("Song API unavailable");
            const data = await response.json();
            if (!data.results?.length) throw new Error("No matching songs found");
            const track = data.results[0];
            const profile = profileForTitle(track.trackName);
            setResult({
              id: `${track.trackId}-${profile.category}`,
              title: track.trackName,
              artist: track.artistName,
              bpm: profile.bpm,
              category: profile.category,
              rpm: profile.rpm,
              note: profile.note,
              duration: formatDuration(track.trackTimeMillis),
              artwork: (track.artworkUrl100 || makeArtwork("BEAT", "#00d4ff", "#ff3bd4")).replace("100x100", "600x600"),
              source: "iTunes Search API + instructor BPM logic",
            });
          } catch (apiError) {
            const fallback =
              seedSongs.find((song) => normalizeTitle(song.title).includes(normalizeTitle(trimmed))) ||
              seedSongs[Math.abs(trimmed.length) % seedSongs.length];
            setResult({ ...fallback, id: songId(fallback) });
            setError("Live search could not finish, so the studio loaded a curated fallback track.");
          } finally {
            setLoading(false);
          }
        };

        return (
          <section className="song-search-panel">
            <p className="eyebrow">Song analyzer</p>
            <form className="song-search-form" onSubmit={searchSong}>
              <label htmlFor="song-query">Search a song</label>
              <div>
                <input
                  id="song-query"
                  value={query}
                  onChange={(event) => setQuery(event.target.value)}
                  placeholder="Try All Night, Diamonds, Unwritten..."
                />
                <button type="submit">{loading ? "Listening..." : "Analyze"}</button>
              </div>
            </form>
            {error && <p className="soft-alert">{error}</p>}
            {result && <SongResultCard song={result} onAdd={onAdd} isSaved={isSaved} />}
            <div className="seed-row">
              {seedSongs.map((song) => (
                <button
                  key={song.title}
                  onClick={() => {
                    setQuery(song.title);
                    setResult({ ...song, id: songId(song) });
                    setError("");
                  }}
                >
                  {song.title}
                </button>
              ))}
            </div>
          </section>
        );
      }

      function SongResultCard({ song, onAdd, isSaved }) {
        return (
          <article className="song-result-card">
            <img src={song.artwork} alt={`${song.title} artwork`} />
            <div>
              <p className="eyebrow">{song.source}</p>
              <h3>{song.title}</h3>
              <p>{song.artist}</p>
              <div className="song-stats">
                <span>{song.bpm} BPM</span>
                <span>{song.rpm} RPM</span>
                <span>{song.category}</span>
                <span>{song.duration}</span>
              </div>
              <p>{song.note}</p>
              <button className="secondary-cta" onClick={() => onAdd({ ...song, id: song.id || songId(song) })} disabled={isSaved}>
                {isSaved ? "In Your Set" : "Add to Playlist"}
              </button>
            </div>
          </article>
        );
      }

      function PlaylistPanel({ playlist, onRemove, onClear }) {
        const totalMinutes = playlist.reduce((sum, song) => {
          const [minutes = "0", seconds = "0"] = String(song.duration).split(":");
          return sum + Number(minutes) + Number(seconds) / 60;
        }, 0);

        return (
          <aside className="playlist-panel">
            <div className="panel-heading">
              <div>
                <p className="eyebrow">localStorage playlist</p>
                <h3>Build Your Set</h3>
              </div>
              <button onClick={onClear} disabled={!playlist.length}>Clear</button>
            </div>
            <div className="playlist-meter">
              <span style={{ width: `${Math.min(100, playlist.length * 16)}%` }}></span>
            </div>
            <p className="playlist-summary">
              {playlist.length ? `${playlist.length} tracks / about ${Math.round(totalMinutes)} minutes` : "Save tracks and refresh the page. Your set will stay here."}
            </p>
            <div className="playlist-list">
              {playlist.map((song) => (
                <article key={song.id} className="playlist-item">
                  <img src={song.artwork} alt="" />
                  <div>
                    <strong>{song.title}</strong>
                    <span>{song.artist}</span>
                    <small>{song.category} / {song.bpm} BPM / {song.rpm}</small>
                  </div>
                  <button onClick={() => onRemove(song.id)} aria-label={`Remove ${song.title}`}>Remove</button>
                </article>
              ))}
            </div>
          </aside>
        );
      }

      function MovementPage() {
        const [positionFilter, setPositionFilter] = useState("all");
        const [levelFilter, setLevelFilter] = useState("all");
        const [combo, setCombo] = useState([]);

        const filteredMovements = movements.filter((move) => {
          const positionMatch = positionFilter === "all" || move.position === positionFilter || move.position === "combo";
          const levelMatch = levelFilter === "all" || move.level === levelFilter;
          return positionMatch && levelMatch;
        });

        const addToCombo = (movement) => {
          setCombo((current) => {
            if (current.some((item) => item.name === movement.name) || current.length >= 5) return current;
            return [...current, movement];
          });
        };

        return (
          <section className="content-page movement-page">
            <SectionHeader eyebrow="Step 3" title="Lead the Movement">
              Choreography should make the beat easier to feel, not harder to survive. Pick moves
              that fit the song, the riders, and the room's energy.
            </SectionHeader>

            <div className="movement-controls">
              <FilterGroup
                label="Position"
                value={positionFilter}
                options={["all", "seated", "standing", "combo"]}
                onChange={setPositionFilter}
              />
              <FilterGroup
                label="Level"
                value={levelFilter}
                options={["all", "beginner", "intermediate", "advanced"]}
                onChange={setLevelFilter}
              />
            </div>

            <div className="movement-layout">
              <div className="movement-grid">
                {filteredMovements.map((move) => (
                  <MovementCard key={move.name} movement={move} onAdd={addToCombo} />
                ))}
              </div>
              <aside className="combo-builder">
                <p className="eyebrow">Build-a-sequence</p>
                <h3>Choreography Combo</h3>
                <div className="combo-track">
                  {combo.length === 0 && <p>Pick up to five moves for a clean chorus pattern.</p>}
                  {combo.map((move, index) => (
                    <button key={move.name} onClick={() => setCombo((current) => current.filter((item) => item.name !== move.name))}>
                      <span>{index + 1}</span>
                      {move.name}
                    </button>
                  ))}
                </div>
                <button className="secondary-cta" onClick={() => setCombo([])} disabled={!combo.length}>Reset Combo</button>
              </aside>
            </div>
          </section>
        );
      }

      function FilterGroup({ label, value, options, onChange }) {
        return (
          <div className="filter-group">
            <span>{label}</span>
            {options.map((option) => (
              <button key={option} className={value === option ? "active" : ""} onClick={() => onChange(option)}>
                {option}
              </button>
            ))}
          </div>
        );
      }

      function MovementCard({ movement, onAdd }) {
        const [open, setOpen] = useState(false);
        return (
          <article className={`movement-card ${open ? "open" : ""}`}>
            <button className="movement-main" onClick={() => setOpen((current) => !current)}>
              <span className={`move-position ${movement.position}`}>{movement.position}</span>
              <h3>{movement.name}</h3>
              <div className="motion-lines" aria-hidden="true"><span></span><span></span><span></span></div>
              <p>{movement.when}</p>
              <small>{movement.level} / {movement.bpm} BPM</small>
            </button>
            {open && (
              <div className="movement-detail">
                <p><strong>Cue:</strong> {movement.cue}</p>
                <p><strong>Caution:</strong> {movement.caution}</p>
                <button onClick={() => onAdd(movement)}>Add to combo</button>
              </div>
            )}
          </article>
        );
      }

      function FinishPage() {
        const [mood, setMood] = useState("gratitude");
        const [revealed, setRevealed] = useState([]);
        const affirmations = [
          "You are the gatekeeper to your own success.",
          "Your mind is your strongest muscle.",
          "If you think you can't, change your mind.",
          "Love ya self, boo.",
        ];

        const toggleAffirmation = (index) => {
          setRevealed((current) =>
            current.includes(index) ? current.filter((item) => item !== index) : [...current, index]
          );
        };

        return (
          <section className="content-page finish-page">
            <SectionHeader eyebrow="Step 4" title="The Final Lap">
              A strong close gives riders a clear exhale, a final cue, and a message worth taking
              with them when they step off the bike.
            </SectionHeader>

            <div className="finish-layout">
              <ClosingMoodSelector mood={mood} onMoodChange={setMood} />
              <article className="closing-script">
                <h3>{closingMoods[mood].line}</h3>
                <p>{closingMoods[mood].ritual}</p>
                <div className="ending-songs">
                  <span>Dancing On My Own</span>
                  <span>These Days</span>
                  <span>Glorious</span>
                  <span>Ribs</span>
                  <span>Iris mood stretch</span>
                </div>
              </article>
            </div>

            <div className="affirmation-grid">
              {affirmations.map((affirmation, index) => (
                <button
                  key={affirmation}
                  className={revealed.includes(index) ? "revealed" : ""}
                  onClick={() => toggleAffirmation(index)}
                >
                  <span>{revealed.includes(index) ? affirmation : "Tap to reveal"}</span>
                </button>
              ))}
            </div>

            <section className="ritual-timeline">
              {["Dim lights", "Quiet pedal", "Final ride", "Slow down", "Stretch", "Breath + clap"].map((step) => (
                <span key={step}>{step}</span>
              ))}
            </section>
          </section>
        );
      }

      function ClosingMoodSelector({ mood, onMoodChange }) {
        return (
          <div className="mood-selector">
            <p className="eyebrow">Choose the room tone</p>
            {Object.entries(closingMoods).map(([key, value]) => (
              <button key={key} className={mood === key ? "active" : ""} onClick={() => onMoodChange(key)}>
                <strong>{value.title}</strong>
                <span>{value.ritual}</span>
              </button>
            ))}
          </div>
        );
      }

      function WireframeRoute() {
        return (
          <section className="content-page wireframe-route">
            <SectionHeader eyebrow="Proposal artifact" title="Wireframe Plan">
              Screenshot this route or open wireframe.html for the grayscale planning document.
            </SectionHeader>
            <WireframeDocument />
          </section>
        );
      }

      function WireframeDocument() {
        const frames = [
          ["Homepage", "Full-screen hero, animated bike wheel, LED wall words, dial navigation, CTA."],
          ["Set the Ride", "Clickable bike diagram, form toggle, metric cards, terminology strip."],
          ["Build the Beat", "iTunes song search, BPM/class logic, song card, localStorage playlist panel."],
          ["Lead the Movement", "Movement filters, expandable cards, build-a-sequence interaction."],
          ["The Final Lap", "Mood selector, affirmation reveal cards, cooldown ritual timeline."],
        ];
        return (
          <div className="wireframe-doc">
            {frames.map(([title, note]) => (
              <article className="wf-frame" key={title}>
                <header>
                  <span>{title}</span>
                  <small>{note}</small>
                </header>
                <div className="wf-hero-box">Hero / section title</div>
                <div className="wf-row">
                  <div className="wf-box tall">Primary interactive module</div>
                  <div className="wf-stack">
                    <div className="wf-box">State-driven panel</div>
                    <div className="wf-box">Notes / cues</div>
                    <div className="wf-box">CTA / controls</div>
                  </div>
                </div>
              </article>
            ))}
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
